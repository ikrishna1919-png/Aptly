name: Scheduled Ingest

# Kicks off the backend's protected ingest endpoint every 6 hours.
# The backend now runs the actual ingest in a background thread and
# returns 202 immediately with a run_id, so this workflow never has to
# wait for the long ATS-fetch loop to finish — that used to time out
# against Render's 100s request budget.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   APTLY_API_URL       — base URL of the deployed backend, e.g.
#                         https://aptly-backend.onrender.com
#   APTLY_ADMIN_TOKEN   — must match the ADMIN_TOKEN env var on the backend.

on:
  schedule:
    # Every 6 hours, on the hour.
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: aptly-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # The POST returns in ~1s; the time here is the optional status poll
    # below, which now watches a full (possibly unlimited) pass for up to
    # ~15 min. 20 leaves margin and never blocks the 6-hourly schedule.
    timeout-minutes: 20
    steps:
      - name: Trigger ingest
        env:
          APTLY_API_URL: ${{ secrets.APTLY_API_URL }}
          APTLY_ADMIN_TOKEN: ${{ secrets.APTLY_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APTLY_API_URL:-}" ] || [ -z "${APTLY_ADMIN_TOKEN:-}" ]; then
            echo "::error::APTLY_API_URL and APTLY_ADMIN_TOKEN secrets must be set."
            exit 1
          fi
          base="${APTLY_API_URL%/}"
          echo "POST ${base}/api/admin/ingest"

          # --fail-with-body: non-2xx → non-zero exit AND prints the body.
          # 202 Accepted is success here — the run continues in the
          # background on the server.
          # --max-time 30: more than enough for the kick-off, since the
          # endpoint returns immediately.
          http_status=$(curl --fail-with-body \
               --silent --show-error \
               --max-time 30 \
               -X POST "${base}/api/admin/ingest" \
               -H "X-Admin-Token: ${APTLY_ADMIN_TOKEN}" \
               -H "Content-Type: application/json" \
               -w "%{http_code}" \
               -o /tmp/ingest_start.json)
          echo "Kick-off HTTP ${http_status}"
          echo "::group::Kick-off response"
          cat /tmp/ingest_start.json
          echo
          echo "::endgroup::"

          run_id=$(python3 -c "import json,sys;d=json.load(open('/tmp/ingest_start.json'));print(d['run_id'])")
          echo "Run ID: ${run_id}"
          echo "RUN_ID=${run_id}" >> "$GITHUB_ENV"

      - name: Poll run status (best effort)
        env:
          APTLY_API_URL: ${{ secrets.APTLY_API_URL }}
          APTLY_ADMIN_TOKEN: ${{ secrets.APTLY_ADMIN_TOKEN }}
          RUN_ID: ${{ env.RUN_ID }}
        # `continue-on-error: true` keeps the workflow green even if the
        # poll fails or the run is still in progress when we stop polling.
        # The kick-off above is the source of truth for "did we trigger
        # the ingest"; the poll is purely for observability.
        continue-on-error: true
        run: |
          set -euo pipefail
          base="${APTLY_API_URL%/}"
          status_url="${base}/api/admin/ingest/${RUN_ID}"
          echo "Polling ${status_url}"
          # Poll every 20s for up to ~15 minutes. A first UNLIMITED pass
          # (INGEST_MAX_PER_RUN=0) over many boards can run long, so we
          # surface the per-batch heartbeat (inserted/updated/attempted +
          # last_progress_at) on every tick — progress is visible right here
          # instead of an opaque "running". success/failed/stale are all
          # terminal (stale = worker presumed killed mid-run). We never FAIL
          # the workflow on a still-running run — it keeps going server-side.
          for i in $(seq 1 45); do
            sleep 20
            body=$(curl --silent --show-error --max-time 15 \
                 "${status_url}" -H "X-Admin-Token: ${APTLY_ADMIN_TOKEN}") \
              || { echo "[$i] status poll failed (transient) — retrying"; continue; }
            current=$(echo "$body" | python3 -c "import json,sys;print(json.load(sys.stdin).get('status','unknown'))")
            summary=$(echo "$body" | python3 -c "import json,sys;s=(json.load(sys.stdin).get('stats') or {});print('inserted=%s updated=%s attempted=%s failed=%s last_progress_at=%s'%(s.get('inserted',0),s.get('updated',0),s.get('boards_attempted',0),s.get('boards_failed',0),s.get('last_progress_at','-')))")
            echo "[$i] status=${current} | ${summary}"
            case "$current" in
              success)
                echo "::group::Final ingest stats"
                echo "$body" | python3 -m json.tool
                echo "::endgroup::"
                exit 0
                ;;
              failed|stale)
                echo "::warning::ingest run reported status=${current}"
                echo "::group::Final ingest body"
                echo "$body" | python3 -m json.tool
                echo "::endgroup::"
                exit 0
                ;;
            esac
          done
          echo "::notice::run ${RUN_ID} still in progress after the poll window; the heartbeat above shows its last progress — re-check GET /api/admin/ingest/${RUN_ID} or the dashboard."
