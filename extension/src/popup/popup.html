<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aptly</title>
    <style>
      :root {
        --primary: #1e6fe0;
        --ink: #1b2330;
        --muted: #5b6677;
        --border: #e3e8ef;
        --bg: #ffffff;
        --soft: #eef4ff;
        --green: #16a34a;
        --yellow: #eab308;
        --red: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        width: 340px;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
        font-size: 14px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      header img { width: 22px; height: 22px; border-radius: 5px; }
      header .name { font-weight: 700; }
      header .spacer { flex: 1; }
      .muted { color: var(--muted); }
      .pad { padding: 14px; }
      button.primary {
        width: 100%;
        background: var(--primary);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      button.primary:disabled { opacity: 0.5; cursor: default; }
      button.link {
        background: none;
        border: 0;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        text-decoration: underline;
        padding: 0;
      }
      .row { display: flex; align-items: center; gap: 8px; }
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        margin-top: 6px;
      }
      .legend { display: flex; gap: 12px; margin-top: 12px; font-size: 12px; }
      .legend span { display: inline-flex; align-items: center; gap: 5px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
      .card {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-top: 12px;
      }
      .hint {
        background: var(--soft);
        border: 1px solid #d7e6ff;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12.5px;
        margin-top: 10px;
      }
      h2 { font-size: 14px; margin: 0 0 4px; }
      .summary b { font-variant-numeric: tabular-nums; }
      .err { color: var(--red); font-size: 12.5px; margin-top: 8px; }
      a { color: var(--primary); }
    </style>
  </head>
  <body>
    <header>
      <img src="../../public/icons/icon-48.png" alt="" />
      <span class="name">Aptly</span>
      <span class="spacer"></span>
      <span id="account" class="muted"></span>
    </header>
    <div id="root" class="pad">
      <p class="muted">Loading…</p>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
