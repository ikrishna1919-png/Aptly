services:
  postgres:
    image: postgres:16-alpine
    container_name: aptly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aptly
      POSTGRES_PASSWORD: aptly
      POSTGRES_DB: aptly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptly -d aptly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
